<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>萌战活动 - VNFest</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0b1020;
  --surface: #121827;
  --surface-2: #182033;
  --surface-3: #202a42;
  --border: rgba(148, 163, 184, .18);
  --text: #eef2ff;
  --muted: #9aa7bd;
  --soft: #6f7d92;
  --cyan: #2dd4bf;
  --pink: #fb7185;
  --amber: #fbbf24;
  --green: #34d399;
  --blue: #60a5fa;
  --shadow: 0 18px 60px rgba(0, 0, 0, .32);
}
:root[data-theme='light'] {
  --bg: #f5f7fb;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --surface-3: #eef2f7;
  --border: rgba(15, 23, 42, .12);
  --text: #111827;
  --muted: #526074;
  --soft: #7c8798;
  --shadow: 0 16px 50px rgba(15, 23, 42, .08);
}
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: "Noto Sans SC", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  line-height: 1.5;
}
button, input, select { font: inherit; }
button { cursor: pointer; }
a { color: inherit; }
.page {
  width: min(1240px, calc(100vw - 28px));
  margin: 0 auto;
  padding: 22px 0 40px;
}
.hero {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 16px;
  align-items: end;
  padding: 22px;
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  box-shadow: var(--shadow);
}
.kicker {
  color: var(--cyan);
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 6px;
}
.hero h1 {
  font-size: clamp(26px, 4vw, 42px);
  letter-spacing: 0;
}
.hero p {
  color: var(--muted);
  max-width: 680px;
  margin-top: 8px;
}
.hero-copy {
  display: grid;
  gap: 10px;
}
.hero-steps,
.flow-guide {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}
.hero-steps {
  margin-top: 4px;
  max-width: 760px;
}
.step-card,
.flow-step {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  padding: 10px 12px;
}
.step-card strong,
.flow-step strong {
  display: block;
  font-size: 13px;
}
.step-card span,
.flow-step span {
  display: block;
  margin-top: 3px;
  color: var(--muted);
  font-size: 12px;
  text-wrap: pretty;
}
.flow-guide {
  margin-bottom: 14px;
}
.flow-step.active {
  border-color: rgba(45, 212, 191, .56);
  background: rgba(45, 212, 191, .08);
}
.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  justify-content: flex-end;
}
.btn {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  padding: 8px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--text);
  text-decoration: none;
}
.btn.primary {
  background: var(--cyan);
  color: #041312;
  border-color: var(--cyan);
  font-weight: 800;
}
.btn.warning {
  color: var(--amber);
  border-color: rgba(251, 191, 36, .46);
}
.btn:disabled {
  opacity: .55;
  cursor: not-allowed;
}
.btn, .contest-card, .stage-tab, .candidate-card, .match-card, .result-row, .stat {
  transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease, background .16s ease, opacity .16s ease;
}
.btn, .contest-card, .stage-tab {
  position: relative;
  overflow: hidden;
}
.btn:not(:disabled):hover, .contest-card:hover, .stage-tab:hover, .candidate-card:hover, .match-card:hover, .result-row:hover, .stat:hover {
  transform: translateY(-1px);
  border-color: rgba(45, 212, 191, .46);
  box-shadow: 0 12px 30px rgba(0, 0, 0, .18);
}
.btn.is-pressing, .contest-card.is-pressing, .stage-tab.is-pressing {
  transform: translateY(1px) scale(.99);
}
.click-ripple {
  position: absolute;
  width: 12px;
  height: 12px;
  border-radius: 999px;
  background: rgba(255, 255, 255, .35);
  pointer-events: none;
  transform: translate(-50%, -50%) scale(0);
  animation: clickRipple .52s ease-out;
}
.is-loading {
  pointer-events: none;
  opacity: .72;
}
.btn.is-loading::after {
  content: "";
  width: 12px;
  height: 12px;
  border-radius: 999px;
  border: 2px solid currentColor;
  border-right-color: transparent;
  animation: spin .7s linear infinite;
}
.layout {
  display: grid;
  grid-template-columns: 340px minmax(0, 1fr);
  gap: 16px;
  margin-top: 16px;
}
.panel {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  box-shadow: var(--shadow);
}
.panel-head {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}
.panel-title {
  font-size: 15px;
  font-weight: 800;
}
.panel-sub {
  margin-top: 2px;
  color: var(--muted);
  font-size: 12px;
}
.panel-body { padding: 16px; }
.filters {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.select {
  min-height: 36px;
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--text);
  padding: 7px 10px;
}
.contest-list {
  display: grid;
  gap: 10px;
  max-height: calc(100vh - 330px);
  overflow: auto;
  padding-right: 4px;
}
.contest-card {
  width: 100%;
  text-align: left;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--text);
  padding: 12px;
}
.contest-card.active {
  border-color: rgba(45, 212, 191, .72);
  box-shadow: inset 3px 0 0 var(--cyan);
}
.contest-card h3 {
  font-size: 14px;
  margin-bottom: 8px;
}
.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  color: var(--muted);
  font-size: 12px;
}
.badge {
  display: inline-flex;
  align-items: center;
  min-height: 22px;
  border: 1px solid var(--border);
  border-radius: 999px;
  background: var(--surface-3);
  color: var(--muted);
  padding: 2px 8px;
  font-size: 12px;
}
.badge.green { color: var(--green); border-color: rgba(52, 211, 153, .42); }
.badge.blue { color: var(--blue); border-color: rgba(96, 165, 250, .42); }
.badge.pink { color: var(--pink); border-color: rgba(251, 113, 133, .42); }
.badge.amber { color: var(--amber); border-color: rgba(251, 191, 36, .42); }
.detail-title {
  font-size: 22px;
  margin-bottom: 8px;
}
.detail-desc {
  color: var(--muted);
  margin-bottom: 14px;
}
.detail-note {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  align-items: center;
  margin-bottom: 14px;
  color: var(--muted);
  font-size: 13px;
}
.stats {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
  margin-bottom: 14px;
}
.stat {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  padding: 12px;
  animation: listIn .28s ease both;
}
.stat strong {
  display: block;
  font-size: 24px;
}
.stat span {
  color: var(--muted);
  font-size: 12px;
}
.stage-tabs {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 12px;
}
.stage-tab {
  min-height: 34px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  color: var(--muted);
  padding: 7px 11px;
}
.stage-tab.active {
  background: var(--cyan);
  color: #041312;
  border-color: var(--cyan);
  font-weight: 800;
}
.section {
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface-2);
  padding: 14px;
  margin-bottom: 12px;
}
.section h2 {
  font-size: 16px;
  margin-bottom: 4px;
}
.section p {
  color: var(--muted);
  font-size: 13px;
}
.section-help {
  display: grid;
  gap: 6px;
  margin: 10px 0 12px;
  color: var(--muted);
  font-size: 13px;
}
.quota-bar {
  overflow: hidden;
  height: 8px;
  border-radius: 999px;
  background: var(--surface);
  border: 1px solid var(--border);
}
.quota-bar span {
  display: block;
  height: 100%;
  width: var(--quota-progress, 0%);
  background: var(--cyan);
}
.candidate-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
  gap: 10px;
}
.candidate-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  padding: 10px;
  display: grid;
  grid-template-columns: 54px minmax(0, 1fr);
  gap: 10px;
  animation: listIn .28s ease both;
}
.cover {
  width: 54px;
  height: 72px;
  object-fit: cover;
  border-radius: 6px;
  background: var(--surface-3);
}
.candidate-card h3 {
  font-size: 14px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.candidate-card p {
  color: var(--muted);
  font-size: 12px;
  margin: 3px 0 8px;
}
.nomination-form {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) auto;
  gap: 8px;
  margin: 12px 0;
}
.text-input {
  min-height: 36px;
  width: 100%;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  color: var(--text);
  padding: 8px 10px;
}
.nomination-list {
  display: grid;
  gap: 8px;
  margin-top: 10px;
}
.match-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}
.match-card {
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  padding: 12px;
  animation: listIn .28s ease both;
}
.match-pair {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
  gap: 8px;
  align-items: center;
  margin: 10px 0;
}
.fighter {
  min-height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface-2);
  padding: 8px;
  font-size: 13px;
}
.result-list {
  display: grid;
  gap: 8px;
}
.result-row {
  display: flex;
  justify-content: space-between;
  gap: 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: var(--surface);
  padding: 9px 10px;
  color: var(--muted);
  animation: listIn .24s ease both;
}
.empty {
  border: 1px dashed var(--border);
  border-radius: 10px;
  background: var(--surface-2);
  color: var(--muted);
  text-align: center;
  padding: 28px 16px;
}
.toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 10;
  min-width: 220px;
  max-width: min(360px, calc(100vw - 36px));
  border: 1px solid var(--border);
  border-radius: 10px;
  background: var(--surface);
  color: var(--text);
  padding: 12px 14px;
  box-shadow: var(--shadow);
  opacity: 0;
  transform: translateY(12px);
  transition: opacity .2s ease, transform .2s ease;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }
@keyframes clickRipple {
  to { opacity: 0; transform: translate(-50%, -50%) scale(18); }
}
@keyframes spin {
  to { transform: rotate(360deg); }
}
@keyframes listIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: .01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: .01ms !important;
  }
  .click-ripple { display: none; }
}
@media (max-width: 900px) {
  .hero { grid-template-columns: 1fr; }
  .hero-actions { justify-content: stretch; }
  .hero-actions .btn { flex: 1; }
  .hero-steps, .flow-guide { grid-template-columns: 1fr; }
  .layout { grid-template-columns: 1fr; }
  .contest-list { max-height: 360px; }
  .stats { grid-template-columns: 1fr; }
  .nomination-form { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<main class="page" data-feature="Moe Contest Public Portal">
  <header class="hero">
    <div class="hero-copy">
      <div class="kicker">Moe Contest Public Portal</div>
      <h1>萌战</h1>
      <p>从提名到正赛，把同好会的角色人气战集中在一个清晰的投票场。先选活动，再看阶段，开放中的阶段即可参与。</p>
      <div class="hero-steps" aria-label="参与流程">
        <div class="step-card"><strong>1. 选择活动</strong><span>按地区和状态筛选正在公开展示的萌战。</span></div>
        <div class="step-card"><strong>2. 查看阶段</strong><span>提名、海选、1v1 正赛会按活动配置展示。</span></div>
        <div class="step-card"><strong>3. 参与投票</strong><span>登录并满足资格后，可提交提名或投给候选。</span></div>
      </div>
    </div>
    <nav class="hero-actions" aria-label="页面导航">
      <button class="btn" type="button" onclick="toggleTheme()">切换主题</button>
      <a class="btn" href="../index.html">返回地图</a>
      <a class="btn primary" href="../admin/moe_manager.html">创建 / 管理萌战</a>
    </nav>
  </header>

  <section class="layout">
    <aside class="panel" data-panel="contests">
      <div class="panel-head">
        <div>
          <div class="panel-title">活动列表</div>
          <div class="panel-sub">筛选公开展示的萌战</div>
        </div>
        <button class="btn" type="button" onclick="loadPublicMoeContests()">刷新</button>
      </div>
      <div class="panel-body">
        <div class="filters">
          <select id="countryFilter" class="select" onchange="loadPublicMoeContests()">
            <option value="all">全部地区</option>
            <option value="china">中国</option>
            <option value="japan">日本</option>
          </select>
          <select id="statusFilter" class="select" onchange="loadPublicMoeContests()">
            <option value="">全部状态</option>
            <option value="published">已发布</option>
            <option value="running">进行中</option>
            <option value="ended">已结束</option>
          </select>
        </div>
        <div id="contestList" class="contest-list"></div>
      </div>
    </aside>

    <section class="panel" data-panel="detail">
      <div class="panel-head">
        <div>
          <div class="panel-title" id="detailHeading">活动详情</div>
          <div class="panel-sub" id="detailSub">选择活动后查看阶段、提名和投票入口</div>
        </div>
      </div>
      <div class="panel-body" data-panel="voting">
        <div id="detailContent" class="empty">请选择左侧萌战活动。</div>
      </div>
    </section>
  </section>
</main>
<div id="toast" class="toast"></div>

<script>
const STATUS_LABELS = {
  draft: '草稿',
  published: '已发布',
  running: '进行中',
  suspended: '已暂停',
  ended: '已结束',
  archived: '已归档',
  pending: '待开始',
  open: '投票中',
  locked: '已锁定',
  settled: '已结算'
};
const STAGE_TYPE_LABELS = {
  nomination: '提名',
  qualifier: '预选',
  group_vote: '分组票选',
  bracket: '1v1 对阵',
  revival: '复活赛',
  final: '决赛'
};
let contests = [];
let selectedContest = null;
let stages = [];
let candidates = [];
let matches = [];
let activeStageId = 0;
let currentUser = null;
let eligibility = null;
let stageResults = [];
let matchResults = {};
let myNominations = { data: [], limit: 3, used: 0, remaining: 3 };
let nominationSummary = [];
let nominationSubjectResults = [];
let nominationCharacterRows = [];
let nominationSubjectContext = null;

function escapeHtml(value) {
  return String(value || '').replace(/[&<>"]/g, function (m) {
    return m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : '&quot;';
  });
}

function apiUrl(file, params) {
  const query = new URLSearchParams(params || {});
  return '../api/' + file + (query.toString() ? '?' + query.toString() : '');
}

async function apiGet(file, params) {
  const response = await fetch(apiUrl(file, params), { credentials: 'same-origin' });
  return response.json();
}

async function apiPost(file, params, body) {
  const response = await fetch(apiUrl(file, params), {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    credentials: 'same-origin',
    body: JSON.stringify(body || {})
  });
  return response.json();
}

function showToast(message, type) {
  const toast = document.getElementById('toast');
  toast.textContent = message;
  toast.style.borderColor = type === 'error' ? 'rgba(251,113,133,.6)' : 'rgba(45,212,191,.5)';
  toast.classList.add('show');
  clearTimeout(toast._timer);
  toast._timer = setTimeout(function () { toast.classList.remove('show'); }, 2400);
}

function installInteractionFeedback() {
  document.addEventListener('pointerdown', function (event) {
    const target = event.target.closest('button:not(:disabled), a.btn, .contest-card, .stage-tab');
    if (!target) return;
    target.classList.add('is-pressing');
    window.setTimeout(function () { target.classList.remove('is-pressing'); }, 180);
    const rect = target.getBoundingClientRect();
    const ripple = document.createElement('span');
    ripple.className = 'click-ripple';
    ripple.style.left = (event.clientX - rect.left) + 'px';
    ripple.style.top = (event.clientY - rect.top) + 'px';
    target.appendChild(ripple);
    ripple.addEventListener('animationend', function () { ripple.remove(); });
  });
}

function currentActionButton() {
  const active = document.activeElement;
  return active && active.matches && active.matches('button') ? active : null;
}

async function withButtonFeedback(label, task) {
  const button = currentActionButton();
  const original = button ? button.textContent : '';
  if (button && !button.disabled) {
    button.classList.add('is-loading');
    button.disabled = true;
    button.textContent = label || '处理中';
  }
  try {
    return await task();
  } finally {
    if (button) {
      button.classList.remove('is-loading');
      button.disabled = false;
      button.textContent = original;
    }
  }
}

function badgeClass(status) {
  if (status === 'running' || status === 'open') return 'green';
  if (status === 'published' || status === 'settled') return 'blue';
  if (status === 'pending') return 'amber';
  if (status === 'suspended') return 'pink';
  return '';
}

function toggleTheme() {
  const root = document.documentElement;
  const next = root.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
  root.setAttribute('data-theme', next);
  try { localStorage.setItem('theme', next); } catch (e) {}
}

async function initMoePublicPortal() {
  try {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light' || savedTheme === 'dark') document.documentElement.setAttribute('data-theme', savedTheme);
  } catch (e) {}
  try {
    const auth = await apiGet('auth.php', { action: 'me' });
    currentUser = auth.logged_in ? auth : null;
  } catch (e) {
    currentUser = null;
  }
  await loadPublicMoeContests();
}

async function loadPublicMoeContests() {
  const list = document.getElementById('contestList');
  list.innerHTML = '<div class="empty">加载萌战活动中...</div>';
  const country = document.getElementById('countryFilter').value || 'all';
  const status = document.getElementById('statusFilter').value || '';
  try {
    const params = { action: 'list', country: country };
    if (status) params.status = status;
    const data = await apiGet('moe_contests.php', params);
    contests = data.success ? (data.data || []) : [];
    renderContestList();
    if (!selectedContest && contests.length) await loadMoeContestDetail(contests[0].id);
    if (!contests.length) {
      document.getElementById('detailContent').innerHTML = '<div class="empty">暂无公开萌战活动。</div>';
    }
  } catch (e) {
    list.innerHTML = '<div class="empty">活动加载失败。</div>';
  }
}

function renderContestList() {
  const list = document.getElementById('contestList');
  if (!contests.length) {
    list.innerHTML = '<div class="empty">暂无公开萌战活动。</div>';
    return;
  }
  list.innerHTML = contests.map(function (contest) {
    const active = selectedContest && Number(selectedContest.id) === Number(contest.id);
    return '<button class="contest-card' + (active ? ' active' : '') + '" type="button" onclick="loadMoeContestDetail(' + Number(contest.id) + ')">' +
      '<h3>' + escapeHtml(contest.title) + '</h3>' +
      '<div class="meta">' +
      '<span class="badge ' + badgeClass(contest.status) + '">' + escapeHtml(STATUS_LABELS[contest.status] || contest.status) + '</span>' +
      '<span>' + escapeHtml(contest.country === 'japan' ? '日本' : '中国') + '</span>' +
      '<span>#' + Number(contest.id) + '</span>' +
      '</div>' +
      '</button>';
  }).join('');
}

async function loadMoeContestDetail(id) {
  try {
    const detail = await apiGet('moe_contests.php', { action: 'get', id: id });
    if (!detail.success) throw new Error(detail.message || '加载失败');
    selectedContest = detail.data;
    stages = detail.stages || [];
    activeStageId = stages.length ? Number(stages[0].id) : 0;
    candidates = [];
    matches = [];
    stageResults = [];
    matchResults = {};
    myNominations = { data: [], limit: 3, used: 0, remaining: 3 };
    nominationSummary = [];
    nominationSubjectResults = [];
    nominationCharacterRows = [];
    nominationSubjectContext = null;
    renderContestList();
    await loadCandidates();
    await loadActiveStageData();
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '活动加载失败', 'error');
  }
}

async function loadCandidates() {
  if (!selectedContest) return;
  const data = await apiGet('moe_candidates.php', {
    action: 'list',
    contest_id: selectedContest.id,
    status: 'approved'
  });
  candidates = data.success ? (data.data || []) : [];
}

async function loadActiveStageData() {
  if (!activeStageId) return;
  const stage = stages.find(function (item) { return Number(item.id) === Number(activeStageId); });
  if (stage && stage.stage_type === 'nomination') {
    await Promise.all([
      loadEligibility(activeStageId),
      loadMyNominations(activeStageId),
      loadNominationSummary(activeStageId)
    ]);
    matches = [];
    stageResults = [];
    return;
  }
  myNominations = { data: [], limit: 3, used: 0, remaining: 3 };
  nominationSummary = [];
  await Promise.all([
    loadEligibility(activeStageId),
    loadStageResults(activeStageId),
    loadMoeMatches(activeStageId)
  ]);
}

async function loadEligibility(stageId) {
  try {
    const data = await apiGet('moe_votes.php', { action: 'eligibility', stage_id: stageId });
    eligibility = data.success ? data : null;
  } catch (e) {
    eligibility = null;
  }
}

async function loadStageResults(stageId) {
  try {
    const data = await apiGet('moe_votes.php', { action: 'stage_results', stage_id: stageId });
    stageResults = data.success && !data.hidden ? (data.data || []) : [];
  } catch (e) {
    stageResults = [];
  }
}

async function loadMoeMatches(stageId) {
  const stage = stages.find(function (item) { return Number(item.id) === Number(stageId); });
  if (!stage || (stage.stage_type !== 'bracket' && stage.stage_type !== 'final')) {
    matches = [];
    return;
  }
  try {
    const data = await apiGet('moe_matches.php', { action: 'list', stage_id: stageId });
    matches = data.success ? (data.data || []) : [];
    await Promise.all(matches.map(function (match) { return loadMatchResults(match.id); }));
  } catch (e) {
    matches = [];
  }
}

async function loadMatchResults(matchId) {
  try {
    const data = await apiGet('moe_votes.php', { action: 'match_results', match_id: matchId });
    matchResults[matchId] = data.success && !data.hidden ? (data.data || []) : [];
  } catch (e) {
    matchResults[matchId] = [];
  }
}

async function loadMyNominations(stageId) {
  if (!currentUser) {
    myNominations = { data: [], limit: 3, used: 0, remaining: 3 };
    return;
  }
  try {
    const data = await apiGet('moe_candidates.php', { action: 'my_nominations', stage_id: stageId });
    myNominations = data.success ? data : { data: [], limit: 3, used: 0, remaining: 3 };
  } catch (e) {
    myNominations = { data: [], limit: 3, used: 0, remaining: 3 };
  }
}

async function loadNominationSummary(stageId) {
  try {
    const data = await apiGet('moe_candidates.php', { action: 'nomination_summary', stage_id: stageId });
    nominationSummary = data.success ? (data.data || []) : [];
  } catch (e) {
    nominationSummary = [];
  }
}

async function switchStage(stageId) {
  activeStageId = Number(stageId);
  await loadActiveStageData();
  renderMoeDetail();
}

function renderMoeDetail() {
  if (!selectedContest) return;
  const activeStage = stages.find(function (stage) { return Number(stage.id) === Number(activeStageId); }) || null;
  document.getElementById('detailHeading').textContent = selectedContest.title || '萌战详情';
  document.getElementById('detailSub').textContent = '活动 #' + selectedContest.id + ' · ' + (selectedContest.country === 'japan' ? '日本' : '中国');
  document.getElementById('detailContent').innerHTML =
    '<h2 class="detail-title">' + escapeHtml(selectedContest.title) + '</h2>' +
    '<p class="detail-desc">' + escapeHtml(selectedContest.description || '暂无活动说明') + '</p>' +
    '<div class="detail-note"><span class="badge ' + badgeClass(selectedContest.status) + '">' + escapeHtml(STATUS_LABELS[selectedContest.status] || selectedContest.status || '未知状态') + '</span><span>开放阶段会显示可操作按钮；未开放阶段仅可查看赛况。</span></div>' +
    '<div class="stats">' +
    '<div class="stat"><strong>' + stages.length + '</strong><span>阶段</span></div>' +
    '<div class="stat"><strong>' + candidates.length + '</strong><span>已通过候选</span></div>' +
    '<div class="stat"><strong>' + matches.length + '</strong><span>当前对阵</span></div>' +
    '</div>' +
    renderFlowGuide(activeStage) +
    renderBracketLink() +
    renderStageTabs() +
    renderVotingPanel(activeStage);
}

function renderBracketLink() {
  if (!selectedContest) return '';
  return '<div class="stage-tabs">' +
    '<a class="btn primary" href="./bracket.html?contest_id=' + Number(selectedContest.id) + '" target="_blank" rel="noopener">查看实时赛程</a>' +
    '</div>';
}

function renderFlowGuide(activeStage) {
  const type = activeStage && activeStage.stage_type;
  const steps = [
    { key: 'nomination', title: '提名', desc: '从 Bangumi 或手动提交角色，形成候选池。' },
    { key: 'qualifier', title: '海选', desc: '集中投票筛出正赛名单，通常取前 32。' },
    { key: 'bracket', title: '正赛', desc: '进入 1v1 对阵，决出 2 名决赛选手。' },
    { key: 'final', title: '决赛', desc: '最终 1v1 单独结算，决出萌王。' }
  ];
  return '<div class="flow-guide" aria-label="萌战流程">' + steps.map(function (step) {
    const active = type === step.key || (type === 'final' && step.key === 'bracket') || (type === 'group_vote' && step.key === 'qualifier');
    return '<div class="flow-step' + (active ? ' active' : '') + '"><strong>' + escapeHtml(step.title) + '</strong><span>' + escapeHtml(step.desc) + '</span></div>';
  }).join('') + '</div>';
}

function renderStageTabs() {
  if (!stages.length) return '<div class="empty">活动尚未配置阶段。</div>';
  return '<div class="stage-tabs">' + stages.map(function (stage) {
    return '<button class="stage-tab' + (Number(stage.id) === Number(activeStageId) ? ' active' : '') + '" type="button" onclick="switchStage(' + Number(stage.id) + ')">' +
      escapeHtml(stage.title || STAGE_TYPE_LABELS[stage.stage_type] || '阶段') +
      '</button>';
  }).join('') + '</div>';
}

function renderVotingPanel(stage) {
  if (!stage) return '';
  const status = STATUS_LABELS[stage.status] || stage.status;
  const type = STAGE_TYPE_LABELS[stage.stage_type] || stage.stage_type;
  const hint = renderEligibilityHint(stage);
  const voting = stage.stage_type === 'nomination'
    ? renderNominationPanel(stage)
    : (stage.stage_type === 'bracket' || stage.stage_type === 'final')
    ? renderMoeMatches(stage)
    : renderMoeCandidates(stage);
  const unit = stage.stage_type === 'nomination'
    ? '每人 ' + Number(myNominations.limit || 3) + ' 个提名位'
    : '每人 ' + Number(stage.votes_per_user || 1) + ' 票';
  return '<section class="section">' +
    '<h2>' + escapeHtml(stage.title) + '</h2>' +
    '<p><span class="badge ' + badgeClass(stage.status) + '">' + escapeHtml(status) + '</span> ' + escapeHtml(type) + ' · ' + unit + '</p>' +
    renderStageHelp(stage) +
    hint +
    '</section>' +
    voting +
    renderResults(stage);
}

function renderStageHelp(stage) {
  const help = stage.stage_type === 'nomination'
    ? '本阶段用于收集角色。优先使用 Bangumi 搜索，能减少同名角色和作品名不一致的问题。'
    : (stage.stage_type === 'bracket' || stage.stage_type === 'final')
    ? '本阶段按对阵投票，每场只能在 A/B 中选择一方；赛程页会展示晋级路径。'
    : '本阶段按候选投票，管理员结算后会推进到下一轮名单。';
  return '<div class="section-help">' + escapeHtml(help) + '</div>';
}

function renderEligibilityHint(stage) {
  if (!currentUser) return '<p style="margin-top:8px;">登录后可以参与开放中的投票。</p>';
  if (!eligibility) return '<p style="margin-top:8px;">正在确认投票资格。</p>';
  if (stage.status !== 'open') return '<p style="margin-top:8px;">当前阶段暂未开放投票。</p>';
  if (!eligibility.eligible) return '<p style="margin-top:8px;">当前账号不符合该活动的投票资格。</p>';
  return '<p style="margin-top:8px;color:var(--green);">你可以参与本阶段投票。</p>';
}

function canVote(stage) {
  return currentUser && eligibility && eligibility.eligible && stage && stage.status === 'open';
}

function renderNominationPanel(stage) {
  const canSubmit = canVote(stage) && Number(myNominations.remaining || 0) > 0;
  const limit = Number(myNominations.limit || 3);
  const used = Number(myNominations.used || 0);
  const progress = limit > 0 ? Math.min(100, Math.round((used / limit) * 100)) : 0;
  const quota = '<p><strong>剩余提名 ' + Number(myNominations.remaining || 0) + ' / ' + limit + '</strong></p>' +
    '<div class="quota-bar" aria-label="提名名额使用进度" style="--quota-progress:' + progress + '%"><span></span></div>';
  const bangumiSearch = '<div class="nomination-list">' +
    '<h3>Bangumi 角色提名</h3>' +
    '<p>搜索作品后选择角色，系统会保留作品来源，便于合并重复提名。</p>' +
    '<form class="nomination-form" onsubmit="searchNominationSubjects(event)">' +
    '<input id="nominationSubjectKeywordInput" class="text-input" name="bangumi_keyword" placeholder="搜索作品名">' +
    '<button class="btn primary" type="submit" ' + (canSubmit ? '' : 'disabled') + '>搜索作品</button>' +
    '</form>' +
    renderNominationSubjectResults() +
    renderNominationCharacterResults(canSubmit) +
    '</div>';
  const form = '<details class="nomination-list"><summary>手动提名</summary><form class="nomination-form" onsubmit="submitNomination(event)">' +
    '<input id="nominationNameInput" class="text-input" name="nomination_name" placeholder="角色名" required>' +
    '<input id="nominationSubjectInput" class="text-input" name="nomination_subject" placeholder="所属作品，可选">' +
    '<button class="btn primary" type="submit" ' + (canSubmit ? '' : 'disabled') + '>提交提名</button>' +
    '</form></details>';
  return '<section class="section">' +
    '<h2>提名角色</h2>' +
    quota +
    bangumiSearch +
    form +
    renderMyNominations() +
    renderNominationSummary() +
    '</section>';
}

function renderNominationSubjectResults() {
  if (!nominationSubjectResults.length) return '';
  return '<div class="nomination-list">' + nominationSubjectResults.slice(0, 6).map(function (subject) {
    const title = subject.title_cn || subject.title || ('Bangumi #' + subject.bangumi_id);
    return '<div class="result-row"><span>' + escapeHtml(title) + '</span>' +
      '<button class="btn" type="button" onclick="loadNominationSubjectCharacters(' + Number(subject.bangumi_id) + ')">查看角色</button></div>';
  }).join('') + '</div>';
}

function renderNominationCharacterResults(canSubmit) {
  if (!nominationCharacterRows.length) return '';
  return '<div class="candidate-grid">' + nominationCharacterRows.slice(0, 30).map(function (character) {
    const name = character.name_cn || character.name || ('角色 #' + character.character_id);
    return '<article class="candidate-card">' +
      (character.image_url ? '<img class="cover" src="' + escapeHtml(character.image_url) + '" alt="">' : '<div class="cover"></div>') +
      '<div><h3 title="' + escapeHtml(name) + '">' + escapeHtml(name) + '</h3>' +
      '<p>' + escapeHtml(character.summary || character.relation || '暂无简介') + '</p>' +
      '<button class="btn primary" type="button" ' + (canSubmit ? '' : 'disabled') + ' onclick="submitBangumiNomination(' + Number(character.character_id) + ')">提名</button>' +
      '</div></article>';
  }).join('') + '</div>';
}

function renderMyNominations() {
  const rows = myNominations.data || [];
  if (!currentUser) return '<div class="empty">登录后可以查看和提交自己的提名。</div>';
  if (!rows.length) return '<div class="empty">你还没有提名角色。</div>';
  return '<div class="nomination-list"><h3>我的提名</h3>' + rows.map(function (row) {
    const name = row.name_cn || row.name || '未命名角色';
    const subject = row.subject_name_cn || row.subject_name || '未填写作品';
    return '<div class="result-row"><span>' + escapeHtml(name) + ' · ' + escapeHtml(subject) + '</span>' +
      '<button class="btn warning" type="button" onclick="withdrawNomination(' + Number(row.id) + ')">撤回</button></div>';
  }).join('') + '</div>';
}

function renderNominationSummary() {
  if (!nominationSummary.length) return '<div class="empty">角色池还没有有效提名。</div>';
  return '<div class="nomination-list"><h3>提名角色池</h3>' + nominationSummary.map(function (row) {
    const name = row.name_cn || row.name || '未命名角色';
    const subject = row.subject_name_cn || row.subject_name || '未填写作品';
    return '<div class="result-row"><span>' + escapeHtml(name) + ' · ' + escapeHtml(subject) + '</span><strong>提名人数 ' + Number(row.nomination_count || 0) + '</strong></div>';
  }).join('') + '</div>';
}

function renderMoeCandidates(stage) {
  if (!candidates.length) return '<div class="empty">还没有已通过候选。</div>';
  return '<div class="candidate-grid">' + candidates.map(function (candidate) {
    const name = candidate.name_cn || candidate.name || '未命名角色';
    const subject = candidate.subject_name_cn || candidate.subject_name || '未填写作品';
    return '<article class="candidate-card">' +
      (candidate.avatar_url ? '<img class="cover" src="' + escapeHtml(candidate.avatar_url) + '" alt="">' : '<div class="cover"></div>') +
      '<div><h3 title="' + escapeHtml(name) + '">' + escapeHtml(name) + '</h3>' +
      '<p>' + escapeHtml(subject) + '</p>' +
      '<button class="btn primary" type="button" ' + (canVote(stage) ? '' : 'disabled') + ' onclick="castStageVote(' + Number(stage.id) + ', ' + Number(candidate.id) + ')">投票</button>' +
      '</div></article>';
  }).join('') + '</div>';
}

function renderMoeMatches(stage) {
  if (!matches.length) return '<div class="empty">当前阶段还没有生成对阵。</div>';
  return '<div class="match-grid">' + matches.map(function (match) {
    const a = match.slot_a_name_cn || match.slot_a_name || '待定';
    const b = match.slot_b_name_cn || match.slot_b_name || '轮空';
    const results = matchResults[match.id] || [];
    const resultHtml = results.length ? '<div class="result-list">' + results.map(function (row) {
      return '<div class="result-row"><span>' + escapeHtml(row.name_cn || row.name || '候选') + '</span><strong>' + escapeHtml(row.votes === undefined ? '排行可见' : row.votes + ' 票') + '</strong></div>';
    }).join('') + '</div>' : '';
    return '<article class="match-card">' +
      '<div class="meta"><span class="badge ' + badgeClass(match.status) + '">' + escapeHtml(STATUS_LABELS[match.status] || match.status) + '</span><span>Round ' + Number(match.round_no) + '</span><span>Match ' + Number(match.match_no) + '</span></div>' +
      '<div class="match-pair">' +
      '<div class="fighter">' + escapeHtml(a) + '</div><strong>VS</strong><div class="fighter">' + escapeHtml(b) + '</div>' +
      '</div>' +
      '<div class="meta">' +
      '<button class="btn primary" type="button" ' + (canVote(stage) && match.status === 'open' ? '' : 'disabled') + ' onclick="castMatchVote(' + Number(stage.id) + ', ' + Number(match.id) + ', ' + Number(match.slot_a_candidate_id || 0) + ')">投 A</button>' +
      (match.slot_b_candidate_id ? '<button class="btn primary" type="button" ' + (canVote(stage) && match.status === 'open' ? '' : 'disabled') + ' onclick="castMatchVote(' + Number(stage.id) + ', ' + Number(match.id) + ', ' + Number(match.slot_b_candidate_id) + ')">投 B</button>' : '') +
      '</div>' +
      resultHtml +
      '</article>';
  }).join('') + '</div>';
}

function renderResults(stage) {
  if (!stageResults.length || stage.stage_type === 'bracket' || stage.stage_type === 'final') return '';
  return '<section class="section"><h2>当前结果</h2><div class="result-list">' + stageResults.map(function (row, index) {
    return '<div class="result-row"><span>#' + (index + 1) + ' ' + escapeHtml(row.name_cn || row.name || '候选') + '</span><strong>' + escapeHtml(row.votes === undefined ? '排行可见' : row.votes + ' 票') + '</strong></div>';
  }).join('') + '</div></section>';
}

async function searchNominationSubjects(event) {
  event.preventDefault();
  return withButtonFeedback('搜索中', async function () {
  const input = document.getElementById('nominationSubjectKeywordInput');
  const keyword = input ? input.value.trim() : '';
  if (!keyword) {
    showToast('请填写作品关键词', 'error');
    return;
  }
  try {
    const data = await apiGet('bangumi_proxy.php', { action: 'search_subject', keyword: keyword });
    if (!data.success) throw new Error(data.message || '搜索失败');
    nominationSubjectResults = data.data || [];
    nominationCharacterRows = [];
    nominationSubjectContext = null;
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '搜索失败', 'error');
  }
  });
}

async function loadNominationSubjectCharacters(subjectId) {
  return withButtonFeedback('加载中', async function () {
  nominationSubjectContext = nominationSubjectResults.find(function (item) {
    return Number(item.bangumi_id) === Number(subjectId);
  }) || null;
  try {
    const data = await apiGet('bangumi_proxy.php', { action: 'subject_characters', subject_id: subjectId });
    if (!data.success) throw new Error(data.message || '角色加载失败');
    nominationCharacterRows = data.data || [];
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '角色加载失败', 'error');
  }
  });
}

async function submitBangumiNomination(characterId) {
  return withButtonFeedback('提名中', async function () {
  const stage = stages.find(function (item) { return Number(item.id) === Number(activeStageId); });
  if (!stage || stage.stage_type !== 'nomination') return;
  const character = nominationCharacterRows.find(function (item) {
    return Number(item.character_id) === Number(characterId);
  });
  if (!character) {
    showToast('角色数据已过期，请重新选择', 'error');
    return;
  }
  try {
    const data = await apiPost('moe_candidates.php', { action: 'nominate' }, {
      stage_id: Number(stage.id),
      source: 'bangumi',
      subject_id: nominationSubjectContext ? Number(nominationSubjectContext.bangumi_id) : null,
      character_id: Number(character.character_id),
      name: character.name || character.name_cn,
      name_cn: character.name_cn || '',
      subject_name: nominationSubjectContext ? (nominationSubjectContext.title || '') : '',
      subject_name_cn: nominationSubjectContext ? (nominationSubjectContext.title_cn || '') : '',
      avatar_url: character.image_url || '',
      summary: character.summary || character.relation || ''
    });
    if (!data.success) throw new Error(data.message || '提名失败');
    showToast('Bangumi 角色已提名', 'success');
    await loadActiveStageData();
    await loadCandidates();
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '提名失败', 'error');
  }
  });
}

async function submitNomination(event) {
  event.preventDefault();
  return withButtonFeedback('提名中', async function () {
  const stage = stages.find(function (item) { return Number(item.id) === Number(activeStageId); });
  if (!stage || stage.stage_type !== 'nomination') return;
  const nameInput = document.getElementById('nominationNameInput');
  const subjectInput = document.getElementById('nominationSubjectInput');
  const name = nameInput ? nameInput.value.trim() : '';
  if (!name) {
    showToast('请填写角色名', 'error');
    return;
  }
  try {
    const data = await apiPost('moe_candidates.php', { action: 'nominate' }, {
      stage_id: Number(stage.id),
      source: 'manual',
      name: name,
      subject_name: subjectInput ? subjectInput.value.trim() : ''
    });
    if (!data.success) throw new Error(data.message || '提名失败');
    showToast('提名成功', 'success');
    if (nameInput) nameInput.value = '';
    if (subjectInput) subjectInput.value = '';
    await loadActiveStageData();
    await loadCandidates();
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '提名失败', 'error');
  }
  });
}

async function withdrawNomination(id) {
  return withButtonFeedback('撤回中', async function () {
  try {
    const data = await apiPost('moe_candidates.php', { action: 'withdraw_nomination', id: id }, { id: id });
    if (!data.success) throw new Error(data.message || '撤回失败');
    showToast('提名已撤回', 'success');
    await loadActiveStageData();
    await loadCandidates();
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '撤回失败', 'error');
  }
  });
}

async function castStageVote(stageId, candidateId) {
  return withButtonFeedback('投票中', async function () {
  try {
    const data = await apiPost('moe_votes.php', { action: 'cast' }, {
      stage_id: stageId,
      candidate_id: candidateId
    });
    if (!data.success) throw new Error(data.message || '投票失败');
    showToast('投票成功', 'success');
    await loadActiveStageData();
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '投票失败', 'error');
  }
  });
}

async function castMatchVote(stageId, matchId, candidateId) {
  return withButtonFeedback('投票中', async function () {
  try {
    const data = await apiPost('moe_votes.php', { action: 'cast' }, {
      stage_id: stageId,
      match_id: matchId,
      candidate_id: candidateId
    });
    if (!data.success) throw new Error(data.message || '投票失败');
    showToast('投票成功', 'success');
    await loadActiveStageData();
    renderMoeDetail();
  } catch (e) {
    showToast(e.message || '投票失败', 'error');
  }
  });
}

installInteractionFeedback();
initMoePublicPortal();
</script>
